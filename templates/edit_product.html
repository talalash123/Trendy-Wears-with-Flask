<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Edit Product - Trendy Wears Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 600px;
        }
        h1 {
            color: #333;
        }
        label {
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        textarea,
        select,
        input[type="file"] {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        a {
            text-decoration: none;
            color: #007bff;
        }
        a:hover {
            text-decoration: underline;
        }
        .flash {
            color: red;
            margin-bottom: 20px;
        }
        img {
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Edit Product</h1>

    <!-- Display flash messages if any -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('edit_product', product_id=product._id) }}" method="POST" enctype="multipart/form-data">
        <label for="type">Product Type:</label>
        <select id="type" name="type" required>
            <option value="Men" {% if product.type == 'Men' %}selected{% endif %}>Men</option>
            <option value="Women" {% if product.type == 'Women' %}selected{% endif %}>Women</option>
        </select>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ product.name }}" required/>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="4" required>{{ product.description }}</textarea>

        <label for="price">Price ($):</label>
        <input type="number" id="price" name="price" step="0.01" min="0" value="{{ product.price }}" required/>

        <label>Current Image:</label><br/>
        {% if product.image_url %}
            <img src="{{ product.image_url }}" width="150" alt="Product Image" />
        {% else %}
            <p>No image available</p>
        {% endif %}

        <label for="image">Change Image (optional):</label>
        <input type="file" id="image" name="image" accept="image/*"/>

        <button type="submit">Update Product</button>
    </form>

    <p><a href="{{ url_for('admin_dashboard') }}">Back to Admin Dashboard</a></p>
</body>
</html>
